<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NitroSense AI - Capture Image</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(rgba(255, 255, 255, 0.88), rgba(255, 255, 255, 0.88)), 
                        url('/static/images/wheatleaf.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        
        .navbar {
            background: linear-gradient(135deg, #1a5f1a 0%, #2e7d32 100%) !important;
        }
        
        .nav-link {
            color: white !important;
            font-weight: 500;
        }
        
        .camera-card {
            border: none;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            background: rgba(255, 255, 255, 0.95);
            margin: 30px 0;
            backdrop-filter: blur(10px);
        }
        
        .camera-header {
            background: linear-gradient(135deg, #2e7d32 0%, #1a5f1a 100%);
            color: white;
            padding: 1.5rem;
        }
        
        #video, #canvas {
            width: 100%;
            max-width: 640px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            border: 3px solid #2e7d32;
        }
        
        .btn-circle {
            border-radius: 50%;
            width: 80px;
            height: 80px;
            font-size: 32px;
            background: linear-gradient(135deg, #2e7d32 0%, #1a5f1a 100%);
            border: none;
            box-shadow: 0 8px 20px rgba(46, 125, 50, 0.3);
        }
        
        .footer {
            text-align: center;
            padding: 20px;
            color: #1a5f1a;
            font-weight: 500;
            margin-top: 30px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    
<nav class="navbar navbar-dark navbar-expand-lg" style="padding: 10px 0; background: linear-gradient(135deg, #1a5f1a 0%, #2e7d32 100%);">
    <div class="container-fluid px-4">
        <!-- Left side: ICAR logo - flush left -->
        <div class="d-flex align-items-center" style="margin-right: auto;">
            <img src="/static/images/icar.png" alt="ICAR" style="height: 70px; width: auto; max-width: 140px; object-fit: contain;">
        </div>
        
        <!-- Center: NitroSense AI - slightly left of center to avoid overlap with Home button -->
        <div class="position-absolute" style="left: 45%; transform: translateX(-50%);">
            <a class="navbar-brand" href="/" style="font-size: 2.2rem; font-weight: 700; white-space: nowrap; color: white; text-decoration: none;">
                <i class="bi bi-tree-fill"></i> NitroSense AI
            </a>
        </div>
        
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" style="border: none;">
            <span class="navbar-toggler-icon"></span>
        </button>
        
        <div class="collapse navbar-collapse" id="navbarNav">
            <!-- Navigation links - positioned on far right with reduced spacing -->
            <ul class="navbar-nav ms-auto" style="gap: 0px; margin-right: 20px;">
                <li class="nav-item">
                    <a class="nav-link" href="/" style="color: white; font-weight: 500; padding: 8px 8px;">
                        <i class="bi bi-house-door-fill"></i> Home
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/estimation" style="color: white; font-weight: 500; padding: 8px 8px;">
                        <i class="bi bi-calculator-fill"></i> Estimation
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/about" style="color: white; font-weight: 500; padding: 8px 8px;">
                        <i class="bi bi-info-circle-fill"></i> About
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/team" style="color: white; font-weight: 500; padding: 8px 8px;">
                        <i class="bi bi-people-fill"></i> Team
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/how-it-works" style="color: white; font-weight: 500; padding: 8px 8px;">
                        <i class="bi bi-gear-fill"></i> How It Works
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/contact" style="color: white; font-weight: 500; padding: 8px 8px;">
                        <i class="bi bi-envelope-fill"></i> Contact
                    </a>
                </li>
            </ul>
            
            <!-- Right side: IASRI logo - flush right with buttons to its left -->
            <div class="d-flex align-items-center">
                <img src="/static/images/iasri.jfif" alt="IASRI" style="height: 70px; width: auto; max-width: 140px; object-fit: contain;">
            </div>
        </div>
    </div>
</nav>

<!-- Responsive CSS for mobile -->
<style>
    @media (max-width: 1200px) {
        .position-absolute {
            left: 44% !important;
        }
        .navbar-brand {
            font-size: 1.8rem !important;
        }
        .navbar-nav {
            gap: 0px !important;
        }
        .nav-link {
            padding: 6px 5px !important;
            font-size: 0.85rem;
        }
    }
    
    @media (max-width: 991px) {
        .position-absolute {
            position: relative !important;
            left: auto !important;
            transform: none !important;
            margin: 10px 0;
            text-align: center;
            width: 100%;
        }
        .navbar .container-fluid {
            flex-wrap: wrap;
        }
        .navbar-nav {
            margin: 10px 0 !important;
            justify-content: center;
            width: 100%;
            gap: 2px !important;
        }
        .navbar-nav .nav-item {
            text-align: center;
        }
        .d-flex.align-items-center {
            margin: 5px auto !important;
            justify-content: center;
            width: 100%;
        }
        img[alt="ICAR"], img[alt="IASRI"] {
            height: 50px !important;
        }
    }
    
    @media (min-width: 992px) {
        .navbar-nav {
            margin-left: auto !important;
            margin-right: 20px !important;
        }
        .nav-link {
            padding: 8px 5px !important;
            font-size: 0.95rem;
        }
    }
</style>


    <div class="container mt-4">
        <div class="row">
            <div class="col-md-8 mx-auto">
                <div class="camera-card">
                    <div class="camera-header text-center">
                        <h4><i class="bi bi-camera"></i> Capture Wheat Leaf Image</h4>
                    </div>
                    <div class="card-body text-center p-4">
                        <div class="mb-3">
                            <video id="video" width="640" height="480" autoplay></video>
                        </div>
                        
                        <div id="preview" style="display: none;" class="mb-3">
                            <h5 class="text-success">Preview:</h5>
                            <canvas id="canvas" width="640" height="480"></canvas>
                        </div>
                        
                        <div class="mb-4">
                            <button id="captureBtn" class="btn btn-circle">📸</button>
                            <button id="retakeBtn" class="btn btn-circle" style="display: none; background: #6c757d;">🔄</button>
                        </div>
                        
                        <div class="d-grid gap-2 col-md-6 mx-auto">
                            <button id="usePhotoBtn" class="btn btn-success btn-lg" style="display: none;">
                                Use This Photo
                            </button>
                            <a href="/" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="footer">
            ICAR-Indian Institute of Wheat and Barley Research (IIWBR), Karnal
        </div>
    </div>

    <script>
        const video = document.getElementById("video");
        const canvas = document.getElementById("canvas");
        const captureBtn = document.getElementById("captureBtn");
        const retakeBtn = document.getElementById("retakeBtn");
        const usePhotoBtn = document.getElementById("usePhotoBtn");
        const preview = document.getElementById("preview");
        
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
            } catch (err) {
                alert("Camera error: " + err.message);
            }
        }
        
        startCamera();
        
        captureBtn.addEventListener("click", function() {
            canvas.getContext("2d").drawImage(video, 0, 0, canvas.width, canvas.height);
            video.style.display = "none";
            preview.style.display = "block";
            captureBtn.style.display = "none";
            retakeBtn.style.display = "inline-block";
            usePhotoBtn.style.display = "block";
        });
        
        retakeBtn.addEventListener("click", function() {
            video.style.display = "block";
            preview.style.display = "none";
            captureBtn.style.display = "inline-block";
            retakeBtn.style.display = "none";
            usePhotoBtn.style.display = "none";
        });
        
        usePhotoBtn.addEventListener("click", function() {
            canvas.toBlob(async function(blob) {
                const formData = new FormData();
                formData.append("image", blob, "captured.jpg");
                
                const response = await fetch("/upload", {
                    method: "POST",
                    body: formData
                });
                
                const result = await response.json();
                if (result.success) {
                    sessionStorage.setItem("capturedImage", result.filename);
                    window.location.href = "/estimation";
                }
            }, "image/jpeg");
        });
    </script>
</body>
</html>
